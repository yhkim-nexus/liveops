# ============================================
# 결정 사항 추적
# ============================================
decisions:
  - id: "D-001"
    date: "2026-03-05"
    description: "Game LiveOps 서비스 기획 프로젝트 킥오프. 시장조사부터 시작한다."
    rationale: "시장 현황 및 경쟁 서비스 파악이 기획의 기초가 됨"
    source: "MTG-GLO-001"

  - id: "D-002"
    date: "2026-03-05"
    description: "프로젝트 코드를 GLO로 확정"
    rationale: "Game LiveOps의 약어"
    source: "MTG-GLO-001"

  - id: "D-003"
    date: "2026-03-05"
    description: "시장조사에 서비스명, URL, 장단점, 제공기능을 필수 포함"
    rationale: "사용자 요구사항"
    source: "MTG-GLO-001"

  - id: "D-004"
    date: "2026-03-09"
    description: "7개 플랫폼(Satori, Unity, AccelByte, Hive, Balancy, GameAnalytics, Metaplay) 심층 분석 완료"
    rationale: "공식 문서 기반 13개 출처 직접 분석"
    source: "MTG-GLO-002"

  - id: "D-005"
    date: "2026-03-09"
    description: "LiveOps 핵심 기능을 8개 카테고리로 분류"
    rationale: "7개 플랫폼 교차 비교 결과: 세그멘테이션, 이벤트, A/B, 원격설정, 푸시, 분석, 경제, 운영"
    source: "MTG-GLO-002"

  - id: "D-006"
    date: "2026-03-09"
    description: "필수/권장/선택 3단계 우선순위 분류 확정"
    rationale: "플랫폼 공통 지원 비율 및 서비스 운영 필수도 기반 (필수 8개, 권장 10개, 선택 10개)"
    source: "MTG-GLO-002"

  - id: "D-007"
    date: "2026-03-10"
    description: "플레이어 세그멘테이션을 GLO 서비스의 핵심 기능(P0)으로 확정"
    rationale: "경쟁사 7개 플랫폼 모두 필수 기능(7/7), 모든 LiveOps 기능의 기반 축"
    source: "MTG-GLO-003"

  - id: "D-008"
    date: "2026-03-10"
    description: "Identity-Properties-Audience 3계층 속성 구조를 설계 기준으로 채택"
    rationale: "Default(자동수집) / Computed(이벤트 기반 자동계산) / Custom(사용자정의) 체계로 확장성과 자동화를 동시에 확보"
    source: "MTG-GLO-003"

  - id: "D-009"
    date: "2026-03-10"
    description: "Audience를 모든 LiveOps 기능(Live Events, Experiments, Feature Flags, Messages)의 유일한 공통 타겟팅 단위로 설계"
    rationale: "단일 오디언스 정의의 재사용으로 로직 중복 제거, 운영 일관성 확보"
    source: "MTG-GLO-003"

  - id: "D-010"
    date: "2026-03-10"
    description: "필터 표현식 DSL을 기본으로 채택하되, 비기술 운영자용 폼 빌더 UI를 주요 인터페이스로 제공"
    rationale: "폼 빌더로 코드 없이 세그먼트 생성, 쿼리 모드는 고급 조건용 옵션으로 제공 (Satori 2.0+ 패턴)"
    source: "MTG-GLO-003"

  - id: "D-011"
    date: "2026-03-23"
    description: "라이브 이벤트 관리를 GLO 서비스 제2 우선순위 기능(P1)으로 확정"
    rationale: "RES-GLO-002에서 6/7 경쟁 플랫폼 필수 기능 확인, Phase 1 세그멘테이션과의 직접 의존성"
    source: "MTG-GLO-004"

  - id: "D-012"
    date: "2026-03-23"
    description: "이벤트 상태 머신을 7단계(draft→pending_approval→approved→scheduled→active→paused/ended→archived)로 정의"
    rationale: "이벤트 전 생명 주기 명확화, 상태별 관리자/시스템 액션 구분"
    source: "MTG-GLO-004"

  - id: "D-013"
    date: "2026-03-23"
    description: "Sticky Membership 메커니즘 도입 (이벤트 active 진입 시 오디언스 스냅샷 생성, 30일 후 자동 삭제)"
    rationale: "세그멘테이션 로직 중복 제거 + 이벤트 무결성 보장, Satori 검증된 패턴"
    source: "MTG-GLO-004"

  - id: "D-014"
    date: "2026-03-23"
    description: "2단계 승인 워크플로우(기획자 요청 → 승인자 검토/승인/반려) 구현"
    rationale: "이벤트 오배포 방지, 운영 안전성 확보"
    source: "MTG-GLO-004"

  - id: "D-015"
    date: "2026-03-23"
    description: "단순 스케줄(one-time) + 반복 스케줄(RFC 5545 rrule) 모두 MVP 포함, 타임존 관리자 친화적 UI 제공"
    rationale: "운영자 편의성, 경쟁사 표준 기능"
    source: "MTG-GLO-004"

  - id: "D-016"
    date: "2026-03-23"
    description: "3가지 긴급 제어 기능(Pause/Kill/Extend) MVP 포함"
    rationale: "진행 중 이벤트 운영 이슈 즉시 대응 필수"
    source: "MTG-GLO-004"

  - id: "D-017"
    date: "2026-03-23"
    description: "성과 대시보드는 Phase 2 UX 스펙 작성 시 상세 설계, MVP는 이벤트 진행 중 참여율만 실시간 제공"
    rationale: "개발 리소스 조정, Phase 1 우선 집중"
    source: "MTG-GLO-004"

  - id: "D-018"
    date: "2026-03-23"
    description: "PRD-GLO-002, UX-GLO-002, DIA-GLO-002 3개 문서 교차 검증 완료 및 일관성 확보"
    rationale: "기능 ID 매핑, 화면-기능 정렬, 데이터 모델 검증"
    source: "MTG-GLO-004"

  - id: "D-019"
    date: "2026-03-24"
    description: "A/B 테스트를 원격 설정 확장형으로 설계 (Satori/Unity 모델 참고)"
    rationale: "원격 설정과 자연스럽게 통합, 변형 관리가 Key-Value 기반으로 직관적"
    source: "MTG-GLO-005"

  - id: "D-020"
    date: "2026-03-24"
    description: "비기술 LiveOps 운영팀 대상 5단계 위저드 UI 설계"
    rationale: "주요 사용자가 비기술 운영팀, 직관적 UX 필수"
    source: "MTG-GLO-005"

  - id: "D-021"
    date: "2026-03-24"
    description: "복합 실험 대상 지원 (원격 설정 + 이벤트 + Feature Flag + 조합)"
    rationale: "경쟁사 대비 차별화, 다양한 실험 시나리오 대응"
    source: "MTG-GLO-005"

  - id: "D-022"
    date: "2026-03-24"
    description: "중급 통계 수준 채택 (Chi-squared, Welch's t-test, Bonferroni 보정, 승자 자동 판별)"
    rationale: "운영팀 이해 가능한 수준 + 통계적 신뢰성 확보"
    source: "MTG-GLO-005"

  - id: "D-023"
    date: "2026-03-24"
